name: Build site

on:
  push:
    paths:
      - 'input/**'
      - 'docs/images/sfeer/*.jpg'
      - 'site_template.html'
      - 'site_builder.py'
      - 'tests/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install site dependencies
        run: pip install -r requirements-site.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v

      - name: Build docs/index.html
        run: python build_site.py

      - name: Commit updated site
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'ci: rebuild site from markdown'
          file_pattern: 'docs/index.html docs/images/sfeer/thumbnails/*.jpg'
