<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TC Kooike</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <meta property="og:title" content="TC Kooike">
  <meta property="og:description" content="Welkom bij TC Kooike — jouw tennisclub in de regio.">
  <meta property="og:image" content="images/logo.png">
  <meta property="og:type" content="website">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --clay: #C1440E; --clay-dark: #8B2500; --clay-light: #E8896A;
      --clay-bg: #FBE9E7; --bg: #F9F5F3; --card: #FFFFFF;
      --border: #DDD0CA; --text: #2C1810; --text-muted: #7D5A50;
      --win: #2E7D32; --win-bg: #E8F5E9;
      --loss: #C62828; --loss-bg: #FFEBEE;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    a { color: var(--clay); text-decoration: none; }
    /* ── Header ── */
    .site-header {
      background: var(--clay); color: #fff;
      padding: 0 24px; height: 92px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      position: sticky; top: 0; z-index: 100;
    }
    .hdr-logo { font-size: 2rem; line-height: 1; flex-shrink: 0; }
    .hdr-text { flex: 1; min-width: 0; }
    .hdr-text h1 { font-size: 1.3rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hdr-text .sub { font-size: .82rem; opacity: .85; margin-top: 2px; }
    .hdr-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 13px; border-radius: 6px; border: none;
      cursor: pointer; font-size: .84rem; font-weight: 600;
      transition: background .15s;
    }
    .btn-ghost { background: rgba(255,255,255,.15); color: #fff; }
    .btn-ghost:hover { background: rgba(255,255,255,.3); }
    .btn-icon { padding: 6px 10px; display:flex; align-items:center; justify-content:center; }
    .btn-icon svg { display:block; }
    /* ── Tab nav ── */
    .tab-nav {
      position: sticky; top: 92px; z-index: 90;
      background: var(--card); border-bottom: 2px solid var(--border);
      padding: 0 24px; display: flex; gap: 2px; align-items: stretch;
      overflow-x: auto; scrollbar-width: none;
    }
    .nav-spacer { flex: 1; }
    .nav-padel-link {
      display: flex; align-items: center; gap: 7px;
      padding: 10px 16px; font-size: .88rem; font-weight: 600;
      color: var(--clay-dark); text-decoration: none; white-space: nowrap;
      border-bottom: 3px solid transparent;
      border-left: 1px solid var(--border); margin-left: 4px;
      transition: color .15s, background .15s;
    }
    .nav-padel-link:hover { color: var(--clay); background: var(--clay-bg); }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 10px 18px; border: none; background: none;
      cursor: pointer; font-size: .88rem; font-weight: 500;
      color: var(--text-muted); border-bottom: 3px solid transparent;
      white-space: nowrap; transition: color .15s, border-color .15s;
    }
    .tab-btn:hover { color: var(--clay); }
    .tab-btn.active { color: var(--clay); border-bottom-color: var(--clay); font-weight: 700; }
    /* ── Content ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    /* ── Sub-tab nav (poules within Zomercompetitie) ── */
    .subtab-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .subtab-btn {
      padding: 7px 16px; border: 1.5px solid var(--border); border-radius: 20px;
      background: var(--card); cursor: pointer; font-size: .85rem; font-weight: 600;
      color: var(--text-muted); transition: background .15s, color .15s, border-color .15s;
    }
    .subtab-btn:hover { color: var(--clay); border-color: var(--clay); }
    .subtab-btn.active { background: var(--clay); color: #fff; border-color: var(--clay); }
    .subtab-panel { display: none; }
    .subtab-panel.active { display: block; }
    /* ── Card ── */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 18px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
    .card-head {
      background: var(--clay); color: #fff;
      padding: 11px 18px; font-weight: 700; font-size: .95rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-head.collapsible { cursor: pointer; user-select: none; }
    .toggle-icon { transition: transform .2s; }
    .card-head.collapsed .toggle-icon { transform: rotate(-90deg); }
    .card-body { padding: 16px 18px; }
    .card-body.hidden { display: none; }
    /* ── Tables ── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    thead th { background: var(--clay); color: #fff; padding: 9px 12px; text-align: left; font-weight: 600; white-space: nowrap; }
    thead th select.th-filter { background: transparent; color: #fff; border: none; font: inherit; font-weight: 600; cursor: pointer; outline: none; padding: 0; margin: 0; width: 100%; appearance: none; -webkit-appearance: none; }
    thead th select.th-filter option { background: var(--clay-dark); color: #fff; }
    thead th.th-active-filter { background: var(--clay-dark); }
    tbody tr:nth-child(even):not(.date-row) { background: var(--clay-bg); }
    tbody tr:hover:not(.date-row) { background: #eeddd7; }
    td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .date-row td { background: #F2E0D9 !important; color: var(--clay-dark); font-weight: 700; padding: 5px 12px !important; font-size: .8rem; letter-spacing: .03em; }
    /* Match schedule rows (Zomercompetitie): keep it simple, all white */
    .match-table tbody tr:nth-child(even):not(.date-row) { background: #fff; }
    .match-table tbody tr:hover:not(.date-row) { background: #faf7f6; }
    /* ── Score inputs ── */
    .score-wrap { display: flex; align-items: center; gap: 5px; }
    .score-in {
      width: 44px; height: 30px;
      border: 1.5px solid var(--border); border-radius: 5px;
      text-align: center; font-size: .95rem; font-weight: 600;
      background: #fff; transition: border-color .15s;
    }
    .score-in:focus { outline: none; border-color: var(--clay); box-shadow: 0 0 0 2px var(--clay-bg); }
    .score-select {
      width: 90px; height: 30px;
      border: 1.5px solid var(--border); border-radius: 5px;
      text-align: center; font-size: .95rem; font-weight: 600;
      background: #fff; padding: 0 2px;
    }
    .no-spin::-webkit-outer-spin-button, .no-spin::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .no-spin { -moz-appearance: textfield; }
    .score-sep { font-weight: 700; color: var(--text-muted); }
    .result-readonly { font-weight: 600; }
    /* Win highlighting — per-poule table: Team A is the 3rd column, Team B the 5th */
    .match-table:not(.match-table-overview) tr.winner-a td:nth-child(3) { color: var(--win); font-weight: 700; }
    .match-table:not(.match-table-overview) tr.winner-b td:nth-child(5) { color: var(--win); font-weight: 700; }
    /* Combined overview table has an extra leading Poule column, shifting Team A/B by one */
    .match-table-overview tr.winner-a td:nth-child(4) { color: var(--win); font-weight: 700; }
    .match-table-overview tr.winner-b td:nth-child(6) { color: var(--win); font-weight: 700; }
    /* ── Result submission modal ── */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,.5); align-items: center; justify-content: center; }
    .modal-card { max-width: 420px; width: 92vw; margin: 0; }
    .modal-close { background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; line-height: 1; }
    /* ── Reschedule icon (per match row) ── */
    .btn-reschedule {
      background: none; border: none; cursor: pointer; padding: 2px 4px;
      color: var(--text-muted); line-height: 0; border-radius: 4px;
      vertical-align: middle; transition: color .15s, background .15s;
    }
    .btn-reschedule:hover { color: var(--clay); background: var(--clay-bg); }
    .btn-reschedule svg { display: block; }
    .resched-note { font-size: .82rem; color: var(--text-muted); line-height: 1.6; }
    .resched-note strong { color: var(--clay-dark); }
    /* ── Badges ── */
    .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: .78rem; font-weight: 700; }
    .badge-w { background: var(--win-bg); color: var(--win); }
    .badge-l { background: var(--loss-bg); color: var(--loss); }
    .badge-n { background: #f0f0f0; color: #bbb; font-weight: 400; }
    /* ── Standings ── */
    .s-wrap thead th { text-align: center; }
    .s-wrap thead th:first-child, .s-wrap thead th:nth-child(2) { text-align: left; }
    .s-wrap td { text-align: center; }
    .s-wrap td:first-child, .s-wrap td:nth-child(2) { text-align: left; }
    .s-rank { font-weight: 600; color: var(--text-muted); }
    .s-name { font-weight: 600; }
    .s-pts { font-weight: 700; color: var(--clay-dark); }
    .s-empty { color: var(--text-muted); font-style: italic; padding: 18px 0; text-align: center; }
    /* ── Info chips ── */
    .chips { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .chip { background: var(--clay-bg); border: 1px solid var(--clay-light); border-radius: 20px; padding: 4px 13px; font-size: .82rem; color: var(--clay-dark); font-weight: 500; }
    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 20px; right: 20px; z-index: 999;
      background: #323232; color: #fff;
      padding: 11px 18px; border-radius: 8px; font-size: .88rem; font-weight: 500;
      box-shadow: 0 4px 14px rgba(0,0,0,.3);
      opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    /* ── Help text ── */
    .help { font-size: .8rem; color: var(--text-muted); margin-top: 8px; }
    /* ── Nav separator & group labels ── */
    .tab-nav { align-items: center; }
    .tab-sep { width: 1px; height: 26px; background: var(--border); margin: 0 6px; flex-shrink: 0; }
    /* ── Static info sections ── */
    .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }
    .info-card { border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; background: var(--card); }
    .info-card h3 { color: var(--clay-dark); font-size: .95rem; margin-bottom: 8px; }
    .info-card p, .info-card li { font-size: .85rem; color: var(--text-muted); line-height: 1.7; }
    .kal-grid { display: flex; flex-direction: column; gap: 8px; }
    .kal-item { display: flex; gap: 14px; align-items: flex-start; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); }
    .kal-date { min-width: 145px; font-size: .82rem; font-weight: 700; color: var(--clay-dark); padding-top: 2px; }
    .kal-desc { font-size: .88rem; color: var(--text); flex: 1; }
    .kal-desc small { display: block; color: var(--text-muted); font-size: .78rem; margin-top: 2px; }
    .sponsor-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .sponsor-pill { padding: 8px 16px; border: 1.5px solid var(--clay-light); border-radius: 24px; font-size: .85rem; font-weight: 500; color: var(--clay-dark); text-decoration: none; background: var(--clay-bg); transition: background .15s, color .15s; }
    .sponsor-pill:hover { background: var(--clay); color: #fff; }
    .contact-block { font-size: .9rem; line-height: 2; }
    .contact-block a { color: var(--clay); }
    table.school-tbl { font-size: .85rem; }
    table.school-tbl td { padding: 7px 11px; }
    table.school-tbl td:last-child { font-weight: 700; color: var(--clay-dark); text-align: right; white-space: nowrap; }
    .faq-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 10px; }
    .faq-list li { padding: 11px 14px; background: var(--clay-bg); border-radius: 8px; font-size: .86rem; line-height: 1.6; }
    .faq-list li strong { color: var(--clay-dark); display: block; margin-bottom: 3px; font-size: .88rem; }
    .cta-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--clay); color: #fff !important; padding: 10px 20px; border-radius: 7px; font-size: .9rem; font-weight: 600; margin-top: 16px; text-decoration: none; transition: background .15s; }
    .cta-btn:hover { background: var(--clay-dark); }
    /* ── Images ── */
    .hero-img { width: 100%; max-height: 280px; object-fit: cover; border-radius: 10px; margin-bottom: 16px; display: block; }
    .hero-img-sm { width: 100%; max-height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; display: block; }
    .board-photo { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--clay-light); flex-shrink: 0; }
    .board-initials { display: flex; align-items: center; justify-content: center; background: var(--clay); color: #fff; font-weight: 700; font-size: 1.2rem; letter-spacing: .03em; }
    .board-card { display: flex; align-items: center; gap: 14px; border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; background: var(--card); }
    .board-info { flex: 1; min-width: 0; }
    .board-name { font-weight: 700; color: var(--clay-dark); margin-bottom: 3px; }
    .board-role { font-size: .82rem; color: var(--text-muted); line-height: 1.5; }
    .board-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
    .photo-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    .photo-gallery a.lb-trigger { display: block; cursor: zoom-in; }
    .photo-gallery img { width: 100%; height: 240px; object-fit: cover; object-position: center top; border-radius: 7px; transition: opacity .15s; }
    .photo-gallery a.lb-trigger:hover img { opacity: .88; }
    /* ── Lightbox ── */
    #lb-overlay { display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,.88); align-items:center; justify-content:center; }
    #lb-overlay.open { display:flex; }
    #lb-overlay img { max-width:92vw; max-height:92vh; border-radius:6px; box-shadow:0 4px 32px rgba(0,0,0,.6); }
    #lb-close { position:absolute; top:18px; right:24px; font-size:2rem; color:#fff; cursor:pointer; line-height:1; background:none; border:none; opacity:.8; }
    #lb-close:hover { opacity:1; }
    /* .sponsor-logo-grid overridden below by 3-per-row grid rule */
    .sponsor-logo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px; }
    .sponsor-logo-grid a { display: flex; align-items: center; justify-content: center; padding: 0; border: 1px solid var(--border); border-radius: 8px; background: #fff; transition: box-shadow .15s; height: 160px; box-sizing: border-box; overflow: hidden; }
    .sponsor-logo-grid a:hover { box-shadow: 0 0 0 2px var(--clay-light); }
    .sponsor-logo-grid img { width: 100%; height: 100%; object-fit: contain; display: block; }
    @media (max-width: 480px) { .sponsor-logo-grid { grid-template-columns: repeat(2, 1fr); } }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .marquee-wrap { overflow: hidden; width: 100%; flex: 1; display: flex; min-height: 80px; }
    .marquee-track { display: flex; align-items: center; gap: 24px; width: max-content; animation: marquee 50s linear infinite; height: 100%; }
    .marquee-track:hover { animation-play-state: paused; }
    .marquee-track img { height: 100%; min-height: 70px; max-height: 200px; width: auto; max-width: 150px; object-fit: contain; flex-shrink: 0; filter: grayscale(20%); transition: filter .2s; }
    .marquee-track img:hover { filter: none; }
    .ladder-img { width: 100%; max-width: 340px; display: block; margin: 0 auto 16px; }
    .whackit-logo { height: 220px; object-fit: contain; margin-bottom: 14px; display: block; }
    /* ── Responsive ── */
    @media (max-width: 640px) {
      .hdr-text h1 { font-size: 1.05rem; }
      .btn-label { display: none; }
      .tab-btn { padding: 10px 11px; font-size: .8rem; }
      .main { padding: 14px 10px; }
      .kal-date { min-width: 100px; }
      .welkom-bottom-grid { grid-template-columns: 1fr !important; }
    }
    @media print {
      .site-header, .tab-nav { display: none !important; }
      .tab-panel { display: block !important; }
      .card { break-inside: avoid; }
    }
  </style>
  <script data-goatcounter="https://tckooike.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<script>
/* ═══════════════════════════════════════════════════════
   Schedule data — embedded at generation time
   ═══════════════════════════════════════════════════════ */
const DATA = __SCHEDULE_DATA__;

/* ═══════════════════════════════════════════════════════
   Supabase — official, server-verified match results
   ═══════════════════════════════════════════════════════ */
const SUPABASE_URL = 'https://ujvazsgxcerliuigxirf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_IiyyYGUDX0jpz6FLWevrpg_7tOuQYu2';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ── State ── */
let RESULTS = {};   // { matchId: { winner_side, set1_w, set1_l, set2_w, set2_l, set3_w, set3_l, submitted_by_team } }
let RESCHEDULES = {};   // { matchId: { new_date, new_time } } — team-initiated moves

// Snapshot of each match's originally-planned slot (from schedule.md), so
// applyReschedules() can be re-run idempotently: reset to original, then
// overlay any live reschedule on top.
const ORIG_SLOTS = {};
for (const m of DATA.matches) ORIG_SLOTS[m.id] = { date: m.date, time: m.time, terrain: m.terrain };

async function fetchResults() {
  const { data, error } = await sb.from('results').select('*');
  if (error) { console.error(error); return; }
  RESULTS = {};
  for (const r of data) RESULTS[r.match_id] = r;
}
function getResult(id) { return RESULTS[id] || null; }

async function fetchReschedules() {
  const { data, error } = await sb.from('reschedules').select('*');
  if (error) { console.error(error); return; }
  RESCHEDULES = {};
  for (const r of data) RESCHEDULES[r.match_id] = r;
}
// Overlay live reschedules onto DATA.matches. A moved match keeps its stable
// id (and thus its original position in Supabase) but shows its new date/time
// on the site; the terrain is cleared to '?' since the teams re-book it.
function applyReschedules() {
  for (const m of DATA.matches) {
    const o = ORIG_SLOTS[m.id];
    if (!o) continue;
    const r = RESCHEDULES[m.id];
    if (r) {
      m.date = r.new_date; m.time = r.new_time; m.terrain = '?';
    } else {
      m.date = o.date; m.time = o.time; m.terrain = o.terrain;
    }
  }
}

/* ═══════════════════════════════════════════════════════
   Score helpers — best of 2 winning sets; 1-1 decided by a
   match-tiebreak (to 10, win by >=2) instead of a 3rd set.
   Set scores are entered via a dropdown of valid combinations and the
   tiebreak winner is auto-derived from the loser's points, so both are
   correct by construction client-side; supabase/schema.sql's
   _valid_set/_valid_tiebreak independently re-verify server-side.
   ═══════════════════════════════════════════════════════ */
function matchSetsWon(id) {
  // Reads the official, server-verified result (sets stored in team_a/team_b
  // order) — not the winner-perspective entry form used by the submit modal.
  const r = getResult(id);
  if (!r) return { a: 0, b: 0 };
  let a = 0, b = 0;
  for (const [w, l] of [[r.set1_w, r.set1_l], [r.set2_w, r.set2_l], [r.set3_w, r.set3_l]]) {
    if (w == null || l == null) continue;
    if (w > l) a++; else if (l > w) b++;
  }
  return { a, b };
}
function resultForA(id) {
  const r = getResult(id);
  return r ? (r.winner_side === 'a' ? 'w' : 'l') : null;
}

/* ═══════════════════════════════════════════════════════
   Standings
   ═══════════════════════════════════════════════════════ */
function computeStandings(poule) {
  const ms = DATA.matches.filter(m => m.poule === poule);
  const st = {};
  for (const t of (DATA.teams_by_poule[poule] || [])) {
    st[t.name] = { p: 0, w: 0, l: 0, setsFor: 0, setsAgainst: 0, pts: 0 };
  }
  for (const m of ms) {
    const res = resultForA(m.id);
    if (res === null) continue;
    const { a: setsA, b: setsB } = matchSetsWon(m.id);
    if (!st[m.team_a]) st[m.team_a] = { p:0, w:0, l:0, setsFor:0, setsAgainst:0, pts:0 };
    if (!st[m.team_b]) st[m.team_b] = { p:0, w:0, l:0, setsFor:0, setsAgainst:0, pts:0 };
    st[m.team_a].p++; st[m.team_b].p++;
    st[m.team_a].setsFor += setsA; st[m.team_a].setsAgainst += setsB;
    st[m.team_b].setsFor += setsB; st[m.team_b].setsAgainst += setsA;
    if (res === 'w') {
      st[m.team_a].w++; st[m.team_a].pts += 2; st[m.team_b].l++;
    } else {
      st[m.team_b].w++; st[m.team_b].pts += 2; st[m.team_a].l++;
    }
  }
  return Object.entries(st)
    .map(([name, s]) => ({ name, ...s }))
    .sort((a, b) => b.pts - a.pts || b.w - a.w || (b.setsFor - b.setsAgainst) - (a.setsFor - a.setsAgainst));
}

/* ── Match schedule card ── */
// A small "move match" icon, shown only on scheduled matches that don't yet
// have a result. Unscheduled matches aren't in Supabase, so there's nothing
// to reschedule; played matches can't be moved.
function rescheduleBtn(m) {
  if (getResult(m.id)) return '';
  const lbl = m.date ? 'Wedstrijd verzetten' : 'Wedstrijd inplannen';
  return '<button class="btn-reschedule" data-reschedule="' + esc(m.id) + '" title="' + lbl + '" aria-label="' + lbl + '">' +
    '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' +
    '</button>';
}
function matchResultCell(m) {
  if (!m.date) {
    return '<span style="color:var(--text-muted);font-style:italic">Nog in te plannen</span>';
  }
  const r = getResult(m.id);
  if (!r) {
    return '<button class="btn btn-submit-result" data-match="' + esc(m.id) + '" style="background:var(--clay);color:#fff">Resultaat doorgeven</button>';
  }
  const fmtSet = (w, l) => (w == null || l == null) ? '' : (w + '–' + l);
  const sets = [fmtSet(r.set1_w, r.set1_l), fmtSet(r.set2_w, r.set2_l), fmtSet(r.set3_w, r.set3_l)]
    .filter(Boolean).join('  ');
  return '<span class="result-readonly">' + esc(sets) + '</span>';
}

function buildMatchCard(poule, ms) {
  if (!ms.length) return '<p style="color:var(--text-muted);font-style:italic;padding:12px 0">Nog geen wedstrijden gepland.</p>';
  const sorted = [...ms].sort((a, b) => {
    const ea = !a.date, eb = !b.date;
    if (ea !== eb) return ea ? 1 : -1;   // matches with no date yet always sort last
    return a.date !== b.date ? a.date.localeCompare(b.date) : a.time.localeCompare(b.time);
  });
  let rows = '', last = null;
  for (const m of sorted) {
    if (m.date !== last) {
      last = m.date;
      const label = m.date ? esc(fmtDate(m.date)) : '📋 Nog in te plannen';
      rows += '<tr class="date-row"><td colspan="5">' + label + '</td></tr>';
    }
    const res = resultForA(m.id);
    const tr = res === 'w' ? 'winner-a' : res === 'l' ? 'winner-b' : '';
    rows += '<tr class="' + tr + '" data-match-row="' + esc(m.id) + '">' +
      '<td>' + esc(m.time) + ' ' + rescheduleBtn(m) + '</td>' +
      '<td>' + esc(m.terrain) + '</td>' +
      '<td>' + esc(m.team_a) + '</td>' +
      '<td data-cell="' + esc(m.id) + '">' + matchResultCell(m) + '</td>' +
      '<td>' + esc(m.team_b) + '</td>' +
    '</tr>';
  }
  return '<div class="card">' +
    '<div class="card-head">📅 Wedstrijdschema — Poule ' + esc(poule) + '</div>' +
    '<div class="tbl-wrap"><table class="match-table">' +
      '<thead><tr><th>Tijd</th><th>Terrein</th><th>Team A</th><th>Resultaat</th><th>Team B</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table></div>' +
  '</div>';
}

/* ── Combined overview: all poules' schedules in one table ── */
function buildOverviewMatchCard(ms) {
  if (!ms.length) return '<p style="color:var(--text-muted);font-style:italic;padding:12px 0">Nog geen wedstrijden gepland.</p>';
  const sorted = [...ms].sort((a, b) => {
    const ea = !a.date, eb = !b.date;
    if (ea !== eb) return ea ? 1 : -1;
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    if (a.time !== b.time) return a.time.localeCompare(b.time);
    return a.poule.localeCompare(b.poule);
  });
  let rows = '', last = null;
  for (const m of sorted) {
    if (m.date !== last) {
      last = m.date;
      const label = m.date ? esc(fmtDate(m.date)) : '📋 Nog in te plannen';
      rows += '<tr class="date-row"><td colspan="6">' + label + '</td></tr>';
    }
    const res = resultForA(m.id);
    const tr = res === 'w' ? 'winner-a' : res === 'l' ? 'winner-b' : '';
    rows += '<tr class="' + tr + '" data-match-row="' + esc(m.id) + '">' +
      '<td>' + esc(m.poule) + '</td>' +
      '<td>' + esc(m.time) + ' ' + rescheduleBtn(m) + '</td>' +
      '<td>' + esc(m.terrain) + '</td>' +
      '<td>' + esc(m.team_a) + '</td>' +
      '<td data-cell="' + esc(m.id) + '">' + matchResultCell(m) + '</td>' +
      '<td>' + esc(m.team_b) + '</td>' +
    '</tr>';
  }
  return '<div class="card">' +
    '<div class="card-head">📅 Wedstrijdschema — Alle poules</div>' +
    '<div class="tbl-wrap"><table class="match-table match-table-overview">' +
      '<thead><tr><th>Poule</th><th>Tijd</th><th>Terrein</th><th>Team A</th><th>Resultaat</th><th>Team B</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table></div>' +
  '</div>';
}
function buildOverview() {
  const ms = DATA.matches;

    '<span class="chip">🎾 ' + nScheduled + ' / ' + ms.length + ' wedstrijden gepland</span>' +

function panelInterclub() {

    if (!m) return null;
    const day = Number(m[1]);
    const month = Number(m[2]);
    const year = Number(m[3]);
    const hour = m[4] ? Number(m[4]) : 0;
    const minute = m[5] ? Number(m[5]) : 0;
    const d = new Date(year, month - 1, day, hour, minute, 0, 0);
    if (Number.isNaN(d.getTime())) return null;

function refreshMatch(id) {
  // A match can appear in more than one place (its poule tab AND the
  // combined "Overzicht" tab), so every lookup here uses querySelectorAll
  // rather than a unique id, scoped via CSS.escape on a data-* attribute.
  const res = resultForA(id);
  const trCls = res === 'w' ? 'winner-a' : res === 'l' ? 'winner-b' : '';
  document.querySelectorAll('[data-match-row="' + CSS.escape(id) + '"]').forEach(tr => tr.className = trCls);
  // A match with a result has been played — drop its reschedule icon (it isn't
  // re-rendered on result submit, so remove it directly).
  if (getResult(id)) {
    document.querySelectorAll('[data-reschedule="' + CSS.escape(id) + '"]').forEach(b => b.remove());
  }
  const match = DATA.matches.find(m => m.id === id);
  if (match) {
    document.querySelectorAll('[data-cell="' + CSS.escape(id) + '"]').forEach(cell => cell.innerHTML = matchResultCell(match));
  }
  if (match) {
    const el = document.getElementById('standings-' + match.poule);
    if (el) el.innerHTML = renderStandings(match.poule);
  }
}
function refreshAll() {
  for (const m of DATA.matches) refreshMatch(m.id);
}

/* Every valid tennis set score, written as "<winner's games>-<loser's games>" —
   the winner here means whoever is later declared the overall match winner,
   so a set the winner lost (e.g. "4-6") is just as valid an option as one
   they won. Mirrors _valid_set in supabase/schema.sql. */
const SET_SCORE_OPTIONS = [
  '6-0', '6-1', '6-2', '6-3', '6-4', '7-5', '7-6',
  '0-6', '1-6', '2-6', '3-6', '4-6', '5-7', '6-7',
];
function tiebreakWinnerFor(loser) {
  if (loser == null || !Number.isInteger(loser) || loser < 0) return null;
  return Math.max(10, loser + 2);
}
function setSelectRow(label, id) {
  const opts = SET_SCORE_OPTIONS.map(s => '<option value="' + s + '">' + s + '</option>').join('');
  return '<div class="score-wrap" style="margin-bottom:8px">' +
    '<span style="width:120px;font-size:.85rem;color:var(--text-muted)">' + esc(label) + '</span>' +
    '<select id="' + id + '" class="score-select"><option value="">Kies…</option>' + opts + '</select>' +
  '</div>';
}
function tiebreakRow() {
  return '<div class="score-wrap" style="margin-bottom:8px">' +
    '<span style="width:120px;font-size:.85rem;color:var(--text-muted)">3e set (MTB10)</span>' +
    '<span style="font-size:.82rem;color:var(--text-muted);margin-right:4px">Punten verliezer:</span>' +
    '<input id="rf-s3l" class="score-in no-spin" type="number" min="0" max="30" placeholder="—">' +
    '<span id="rf-s3-preview" class="help" style="margin-left:8px"></span>' +
  '</div>';
}
function renderResultForm(m) {
  return '<label class="help">Toegangscode</label>' +
    '<input id="rf-code" class="score-in" style="width:100%;margin-bottom:12px" type="text" maxlength="6" placeholder="bv. AB12CD">' +
    '<label class="help">Wie heeft gewonnen?</label>' +
    '<div style="margin:6px 0 12px">' +
      '<label style="display:block"><input type="radio" name="rf-winner" value="a"> ' + esc(m.team_a) + '</label>' +
      '<label style="display:block"><input type="radio" name="rf-winner" value="b"> ' + esc(m.team_b) + '</label>' +
    '</div>' +
    '<p class="help" style="margin-bottom:6px">Kies per set de stand vanuit het perspectief van de WINNAAR (winnaar eerst, ook in een set die de winnaar verloren heeft). Ging het naar een match-tiebreak? Typ enkel het puntenaantal van de verliezer — de winnaar staat altijd op 10 (of meer, bij gelijkopgaande stand).</p>' +
    setSelectRow('Set 1', 'rf-s1') + setSelectRow('Set 2', 'rf-s2') + tiebreakRow() +
    '<button id="rf-submit" class="btn" style="background:var(--clay);color:#fff;width:100%;margin-top:10px" disabled>Versturen</button>';
}
function wireResultForm(m) {
  const parseSet = id => {
    const v = document.getElementById(id).value;
    if (!v) return null;
    const [w, l] = v.split('-').map(Number);
    return { w, l };
  };
  const validateLive = () => {
    const s1 = parseSet('rf-s1');
    const s2 = parseSet('rf-s2');
    const lRaw = document.getElementById('rf-s3l').value;
    const loser = lRaw === '' ? null : Number(lRaw);
    const winner = tiebreakWinnerFor(loser);
    document.getElementById('rf-s3-preview').textContent = (winner != null) ? ('→ ' + winner + '–' + loser) : '';

    let wins = 0;
    if (s1 && s1.w > s1.l) wins++;
    if (s2 && s2.w > s2.l) wins++;
    if (winner != null) wins++;   // the tiebreak winner is always the declared winner, by construction
    const codeOk = document.getElementById('rf-code').value.trim().length > 0;
    const winnerOk = !!document.querySelector('input[name="rf-winner"]:checked');
    document.getElementById('rf-submit').disabled = !(codeOk && winnerOk && s1 && s2 && wins >= 2);
  };
  ['rf-s1', 'rf-s2'].forEach(id => document.getElementById(id).addEventListener('change', validateLive));
  document.getElementById('rf-s3l').addEventListener('input', validateLive);
  document.getElementById('rf-code').addEventListener('input', validateLive);
  document.querySelectorAll('input[name="rf-winner"]').forEach(r => r.addEventListener('change', validateLive));
  document.getElementById('rf-submit').addEventListener('click', () => submitResult(m));
}
async function submitResult(m) {
  const parseSet = id => {
    const [w, l] = document.getElementById(id).value.split('-').map(Number);
    return { w, l };
  };
  const s1 = parseSet('rf-s1');
  const s2 = parseSet('rf-s2');
  const lRaw = document.getElementById('rf-s3l').value;
  const loser = lRaw === '' ? null : Number(lRaw);
  const winner = tiebreakWinnerFor(loser);
  const payload = {
    p_match_id: m.id,
    p_access_code: document.getElementById('rf-code').value.trim(),
    p_winner_side: document.querySelector('input[name="rf-winner"]:checked').value,
    p_set1_w: s1.w, p_set1_l: s1.l,
    p_set2_w: s2.w, p_set2_l: s2.l,
    p_set3_w: winner, p_set3_l: loser,
  };
  document.getElementById('rf-submit').disabled = true;
  const { data, error } = await sb.rpc('submit_result', payload);
  if (error || !data || !data.success) {
    toastMsg((data && data.error) || 'Er ging iets mis bij het doorgeven.');
    document.getElementById('rf-submit').disabled = false;
    return;
  }
  toastMsg('Resultaat doorgegeven!');
  closeResultModal();
  await fetchResults();
  refreshMatch(m.id);
}

  return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : '';
}
function renderRescheduleForm(m) {
  const pad = n => String(n).padStart(2, '0');
  let hourOpts = '';
  for (let h = 8; h <= 22; h++) hourOpts += '<option value="' + pad(h) + '">' + pad(h) + '</option>';
  const minOpts = ['00', '30']
    .map(mm => '<option value="' + mm + '">' + mm + '</option>').join('');
  return '<p class="resched-note" style="margin-bottom:14px">' +
      '<strong>' + esc(m.team_a) + '</strong> vs <strong>' + esc(m.team_b) + '</strong><br>' +
      (m.date ? ('Huidig: ' + esc(fmtDate(m.date)) + ' om ' + esc(m.time)) : 'Nog niet ingepland') +
    '</p>' +
    '<label class="help">Toegangscode (van één van beide teams)</label>' +
    '<input id="rs-code" class="score-in" style="width:100%;margin-bottom:12px" type="text" maxlength="6" placeholder="bv. AB12CD">' +
    '<label class="help">Nieuwe datum</label>' +
    '<input id="rs-date" class="score-in" style="width:100%;margin-bottom:4px" type="date" lang="nl-BE">' +
    '<p id="rs-date-preview" class="help" style="margin:0 0 12px"></p>' +
    '<label class="help">Nieuw uur (24u)</label>' +
    '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">' +
      '<select id="rs-hour" class="score-select" style="flex:1"><option value="">Uur…</option>' + hourOpts + '</select>' +
      '<span class="score-sep">:</span>' +
      '<select id="rs-min" class="score-select" style="flex:1"><option value="">Min…</option>' + minOpts + '</select>' +
    '</div>' +
    '<button id="rs-submit" class="btn" style="background:var(--clay);color:#fff;width:100%;margin-top:6px" disabled>' + (m.date ? 'Verzetten' : 'Inplannen') + '</button>';
}
function wireRescheduleForm(m) {
  const val = id => document.getElementById(id).value;
  const validate = () => {
    const code = val('rs-code').trim();
    const date = val('rs-date');
    const hour = val('rs-hour'), min = val('rs-min');
    document.getElementById('rs-date-preview').textContent = date ? ('→ ' + rsFmtDMY(date)) : '';
    document.getElementById('rs-submit').disabled = !(code.length > 0 && date && hour && min);
  };
  document.getElementById('rs-code').addEventListener('input', validate);
  document.getElementById('rs-date').addEventListener('input', validate);
  ['rs-date', 'rs-hour', 'rs-min'].forEach(id =>
    document.getElementById(id).addEventListener('change', validate));
  document.getElementById('rs-submit').addEventListener('click', () => submitReschedule(m));
}
async function submitReschedule(m) {
  const val = id => document.getElementById(id).value;
  const payload = {
    p_match_id: m.id,
    p_access_code: val('rs-code').trim(),
    p_new_date: val('rs-date'),
    p_new_time: val('rs-hour') + ':' + val('rs-min'),
  };
  document.getElementById('rs-submit').disabled = true;
  const { data, error } = await sb.rpc('reschedule_match', payload);
  if (error || !data || !data.success) {
    toastMsg((data && data.error) || 'Er ging iets mis bij het verzetten.');
    document.getElementById('rs-submit').disabled = false;
    return;
  }
  // Reflect the move immediately (re-fetch overrides, re-render the schedule)
  // and swap the modal to the responsibility reminder.
  await fetchReschedules();
  applyReschedules();
  buildAllPanels();
  showRescheduleDone(m);
}
function showRescheduleDone(m) {
  document.getElementById('reschedule-modal-body').innerHTML =
    '<p class="resched-note" style="margin-bottom:12px">✅ <strong>Wijziging opgeslagen.</strong> De nieuwe datum staat nu in het schema.</p>' +
    '<p class="resched-note" style="margin-bottom:10px">📅 Vergeet niet zelf nog een terrein te reserveren via ' +
      '<a href="https://www.tennisenpadelvlaanderen.be/nl/clubdashboard/reserveer-een-terrein?clubId=2158" target="_blank">Tennis &amp; Padel Vlaanderen</a> ' +
      '(kan tot max. <strong>7 dagen</strong> op voorhand).</p>' +
    '<p class="resched-note" style="margin-bottom:16px">🤝 Deze wijziging kan enkel <strong>in onderling overleg met het andere team</strong>. Verwittig hen dus zeker.</p>' +
    '<button id="rs-done" class="btn" style="background:var(--clay);color:#fff;width:100%">Sluiten</button>';
  document.getElementById('rs-done').addEventListener('click', closeRescheduleModal);
}

/* ═══════════════════════════════════════════════════════
   Init
   ═══════════════════════════════════════════════════════ */
async function init() {
  document.getElementById('js-title').textContent = DATA.club_name;
  document.title = DATA.club_name;
  await fetchResults();
  await fetchReschedules();
  applyReschedules();
  buildNav();
  buildAllPanels();
  document.addEventListener('click', e => {
    const resBtn = e.target.closest('.btn-submit-result');
    if (resBtn) { openResultModal(resBtn.dataset.match); return; }
    const rsBtn = e.target.closest('.btn-reschedule');
    if (rsBtn) openRescheduleModal(rsBtn.dataset.reschedule);
  });
  document.getElementById('result-modal-close').addEventListener('click', closeResultModal);
  document.getElementById('result-modal-overlay').addEventListener('click', e => {
    if (e.target.id === 'result-modal-overlay') closeResultModal();
  });
  document.getElementById('reschedule-modal-close').addEventListener('click', closeRescheduleModal);
  document.getElementById('reschedule-modal-overlay').addEventListener('click', e => {
    if (e.target.id === 'reschedule-modal-overlay') closeRescheduleModal();
  });
  // Lightbox
  const overlay = document.getElementById('lb-overlay');
  const lbImg   = document.getElementById('lb-img');
  function lbOpen(src, alt) { lbImg.src = src; lbImg.alt = alt; overlay.classList.add('open'); }
  function lbClose() { overlay.classList.remove('open'); lbImg.src = ''; }
  document.getElementById('lb-close').addEventListener('click', lbClose);
  overlay.addEventListener('click', e => { if (e.target === overlay) lbClose(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lbClose(); });
  document.addEventListener('click', e => {
    const a = e.target.closest('a.lb-trigger');
    if (!a) return;
    e.preventDefault();
    lbOpen(a.href, a.getAttribute('aria-label') || '');
  });
}
document.addEventListener('DOMContentLoaded', init);
</script>
